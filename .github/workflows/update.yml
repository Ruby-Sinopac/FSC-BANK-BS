name: 更新資產負債簡表

# 每月排程 + 可手動觸發
on:
  schedule:
    # 每月 5 號 01:00 UTC（台北 09:00）。月初資料通常已釋出。
    - cron: "0 1 5 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝相依套件
        run: pip install -r requirements.txt

      - name: 執行更新
        run: python -m fsc_scraper update --verbose

      - name: 若資料有變更則 commit 回倉庫
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore: 自動更新資產負債簡表資料"
            git push
          else
            echo "資料無變更，略過 commit。"
          fi
