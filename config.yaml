# =============================================================================
# 金管會銀行局「資產負債簡表(102年以後)」自動抓取設定檔
# =============================================================================
# 這個系統的下載其實是一條純網址：
#   webMain.aspx?sys=220&kind=21&...&ym=11403&ymt=11503&...&outkind=1
# 其中 ym / ymt 是起訖民國年月(RRRMM)。樹狀選單是 iframe + JavaScript 動態載入
# (左側樹在 frame qry11、查詢表單在 qry12)，自動點擊較脆弱，但只要在瀏覽器
# 「成功查到一次」拿到那條下載網址，之後增量更新只需換掉 ym/ymt 直接下載即可。
#
# 【推薦流程】
#   1. 瀏覽器開 webMain.aspx?sys=100&funid=defqry，左側樹點到
#      「資產負債簡表(102年以後)」，設好期間查詢，讓數字表格跑出來。
#   2. 把「結果/下載」的完整網址複製，整條貼到下面 query.download_url。
#   3. 執行更新： python -m fsc_scraper update
#      （程式會沿用你網址裡的所有參數，只把 ym/ymt 換成「你資料的下一期 ~ 最新」。）
# =============================================================================

site:
  # 網站根網址（結尾不要加斜線）
  base_url: "https://survey.banking.gov.tw/statis"
  # 該系統頁面實際編碼；多半是 utf-8，舊頁面可能是 big5。
  # 留 auto 會自動偵測；偵測不準時可手動改成 utf-8 或 big5。
  encoding: "auto"

query:
  # ===== 推薦：直接貼入完整下載網址（可多條）=====
  # 在瀏覽器查到「資產負債簡表(102年以後)」結果後，把整條網址貼到這裡（含 ym=、ymt=）。
  # 程式會沿用網址內所有參數（含複分類選的銀行 codspc0），只自動替換 ym/ymt 與 rdm。
  # 銀行較多、需分批查詢時，可貼多條，程式會分別抓取再合併。
  # 目前這兩條 = 共 14 家本國銀行的資產負債簡表(102年以後)，funid=i20010。
  download_urls:
    - "https://survey.banking.gov.tw/statis/webMain.aspx?sys=220&ym=11502&ymt=11503&kind=21&type=1&funid=i20010&cycle=1&outmode=0&compmode=00&outkind=1&fldspc=0,22,&codspc0=0,1,7,3,12,2,16,1,22,1,26,1,32,3,&rdm=R9346208"
    - "https://survey.banking.gov.tw/statis/webMain.aspx?sys=220&ym=11502&ymt=11503&kind=21&type=1&funid=i20010&cycle=1&outmode=0&compmode=00&outkind=1&fldspc=0,22,&codspc0=0,1,35,1,37,1,39,1,&rdm=R2622376"

  # 單條版（相容用；若用上面的 download_urls 可留空）
  download_url: ""

  # ===== 備援：若不貼完整網址，才會用下面的 funid + 參數樣板（較易猜錯）=====
  funid: ""            # 例如 "i20010"

  # ---- 取得資料的網址樣板（僅在 download_url 留空時使用）----
  # 這個 statis 系統的資料是由 stmain.jsp 用網址參數產生的。
  # 以下為已知的參數結構，{ } 內為程式會自動代入的值：
  #   {ym}     起始民國年月（含），如 10201 表示民國102年1月
  #   {ymt}    結束民國年月（含）
  #   {funid}  上面填的 funid
  #   {outmode}輸出格式（見下方 outmode）
  #   {rdm}    亂數字串（程式自動產生，避免快取）
  # inspect 步驟若發現參數不同（kind/type/cycle/sys），請依實際情況修改此樣板。
  result_url_template: "{base_url}/stmain.jsp?sys=220&ym={ym}&ymt={ymt}&kind=21&type=1&funid={funid}&cycle=41&outmode={outmode}&compmode=00&outkind=1&rdm={rdm}"

  # 輸出格式：0 = HTML 網頁(最穩定，程式會自己解析表格)；其他值依系統而定可能是 CSV/Excel。
  # 不確定就用 0。
  outmode: 0

  # 抓取起始期：
  #   "auto"  -> 增量更新，從歷史資料最後一期的下一期開始抓（建議）。
  #   "10201" -> 指定民國年月強制重抓。
  start_period: "auto"

  # 抓取結束期：
  #   "latest" -> 自動偵測網站上最新可用的一期。
  #   "11412"  -> 指定民國年月。
  end_period: "latest"

storage:
  # 歷史/輸出資料檔。支援 .xlsx 與 .csv。
  data_file: "data/asset_liability_summary.xlsx"
  # Excel 工作表名稱（僅 .xlsx 時有效）
  sheet_name: "資產負債簡表"
  # 用來判斷「最後一期」的期別欄名（抓回來解析後的期間欄）。
  # 第一次跑 `update --dry-run` 看實際欄名後再回來確認。
  period_column: "期別"
  # 合併去重的鍵欄位。因為有多家銀行，通常要「期別 + 銀行」兩欄一起當鍵，
  # 否則同一期不同銀行會被誤刪。請依 dry-run 看到的實際欄名調整。
  key_columns:
    - "期別"
    - "銀行"

http:
  timeout: 60
  retries: 4
  # 禮貌性間隔（秒），避免對政府網站發太快。
  delay_between_requests: 1.5
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
